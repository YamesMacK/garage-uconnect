<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0f">
<title>Garage · Analog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0d0d0f;
    --bg-2: #15151a;
    --bezel-out: linear-gradient(135deg, #4a4d54 0%, #1a1c20 50%, #2a2c32 100%);
    --bezel-in: linear-gradient(135deg, #15151a 0%, #08080a 100%);
    --face: radial-gradient(circle at 50% 30%, #1c1e24 0%, #0a0b0f 100%);
    --line: rgba(255,255,255,0.08);
    --fg: #e8e6df;
    --dim: #7a7872;
    --gold: #c4a661;
    --red: #c84141;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }
  body {
    font-family: var(--sans);
    background:
      radial-gradient(ellipse at 50% 0%, #1a1a20 0%, var(--bg) 60%),
      var(--bg);
    background-attachment: fixed;
    color: var(--fg);
    min-height: 100vh;
    padding: max(env(safe-area-inset-top), 22px) 16px max(env(safe-area-inset-bottom), 100px);
    max-width: 480px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
    padding: 0 4px;
  }
  .vehicle {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .vehicle .year {
    color: var(--gold);
    font-style: italic;
    font-weight: 500;
  }
  .live {
    font-size: 11px;
    color: var(--dim);
    font-style: italic;
    letter-spacing: 0.05em;
  }
  .live::before {
    content: '●';
    color: #4a9c5a;
    margin-right: 5px;
    font-size: 9px;
  }

  /* Two big dials side by side */
  .dials {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
  }
  .dial-wrap {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(196,166,97,0.06) 0%, transparent 60%),
      var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 14px 10px 10px;
    position: relative;
  }
  .dial-label {
    font-family: var(--serif);
    font-size: 11px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.32em;
    text-align: center;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .dial-svg {
    width: 100%;
    aspect-ratio: 1;
    display: block;
  }
  .dial-readout {
    text-align: center;
    margin-top: 8px;
  }
  .dial-readout-value {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .dial-readout-value .u {
    font-family: var(--sans);
    font-size: 10px;
    color: var(--dim);
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-left: 3px;
    vertical-align: top;
    padding-top: 4px;
    display: inline-block;
  }
  .dial-readout-sub {
    font-family: var(--sans);
    font-size: 10px;
    color: var(--dim);
    font-style: italic;
    margin-top: 3px;
    letter-spacing: 0.04em;
  }
  .reset-pill {
    position: absolute;
    top: 10px; right: 10px;
    background: transparent;
    border: 1px solid rgba(196,166,97,0.4);
    color: var(--gold);
    font-family: var(--sans);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 100px;
    cursor: pointer;
  }
  .reset-pill:active { background: rgba(196,166,97,0.12); }

  /* Odometer band */
  .odo-band {
    background: linear-gradient(180deg, #1a1a20 0%, #0e0e12 100%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .odo-band::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, transparent 0, transparent 20px, rgba(196,166,97,0.04) 20px, rgba(196,166,97,0.04) 21px);
    pointer-events: none;
  }
  .odo-label {
    font-family: var(--serif);
    font-size: 11px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.32em;
    font-weight: 600;
  }
  .odo-value {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.06em;
  }
  .odo-value .u {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--dim);
    font-weight: 500;
    letter-spacing: 0.1em;
    margin-left: 4px;
    text-transform: uppercase;
  }

  /* Tire diagram */
  .tires-card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .tires-card-label {
    font-family: var(--serif);
    font-size: 11px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.32em;
    margin-bottom: 12px;
    font-weight: 600;
    text-align: center;
  }
  .tires-grid {
    display: grid;
    grid-template-columns: 1fr 60px 1fr;
    gap: 12px 24px;
    align-items: center;
    justify-items: center;
  }
  .tire-num {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
    text-align: center;
  }
  .tire-num span {
    display: block;
    font-family: var(--sans);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.18em;
    margin-top: 4px;
    font-weight: 500;
    font-style: italic;
  }
  .tire-num .u {
    font-family: var(--sans);
    font-size: 10px;
    color: var(--dim);
    font-weight: 500;
    margin-left: 2px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .truck-hint {
    grid-row: 1 / 3;
    grid-column: 2;
    width: 100%;
    aspect-ratio: 56 / 100;
  }

  /* Map */
  .map-card {
    height: 200px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--line);
    margin-bottom: 14px;
    position: relative;
    background: var(--bg-2);
  }
  .map-card iframe {
    width: 100%; height: 100%;
    border: 0;
    filter: sepia(0.15) saturate(0.85) brightness(0.92);
  }
  .map-stamp {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(13, 13, 15, 0.85);
    border: 1px solid rgba(196,166,97,0.3);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .map-link {
    position: absolute;
    bottom: 10px; right: 10px;
    background: var(--gold);
    color: #0a0a0a;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Commands */
  .commands {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px 16px max(env(safe-area-inset-bottom), 14px);
    background: linear-gradient(180deg, transparent 0%, rgba(13,13,15,0.92) 40%, var(--bg) 100%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    max-width: 480px;
    margin: 0 auto;
  }
  .cmd {
    background: linear-gradient(180deg, #2a2c32 0%, #15171c 100%);
    border: 1px solid rgba(196,166,97,0.25);
    color: var(--fg);
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 14px 0;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 6px 14px rgba(0,0,0,0.5);
  }
  .cmd:active { filter: brightness(0.85); transform: scale(0.97); }
  .cmd-primary {
    background: linear-gradient(180deg, #d4b074 0%, #a07c33 100%);
    border-color: rgba(196,166,97,0.6);
    color: #1a1308;
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="vehicle">Ram 2500 <span class="year">· 2022</span></div>
    <span class="live">live · 2 min</span>
  </div>

  <div class="dials">
    <!-- Fuel dial -->
    <div class="dial-wrap">
      <div class="dial-label">Fuel</div>
      <svg class="dial-svg" viewBox="0 0 200 200">
        <defs>
          <radialGradient id="faceGr" cx="50%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#22242c"/>
            <stop offset="100%" stop-color="#08080b"/>
          </radialGradient>
          <linearGradient id="bezelGr" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#5a5d65"/>
            <stop offset="40%" stop-color="#1a1c20"/>
            <stop offset="100%" stop-color="#3a3c44"/>
          </linearGradient>
          <radialGradient id="glassGr" cx="50%" cy="20%" r="60%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
            <stop offset="40%" stop-color="rgba(255,255,255,0.04)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
        </defs>
        <!-- Outer bezel -->
        <circle cx="100" cy="100" r="95" fill="url(#bezelGr)"/>
        <!-- Inner ring -->
        <circle cx="100" cy="100" r="86" fill="#0a0b0e"/>
        <!-- Face -->
        <circle cx="100" cy="100" r="80" fill="url(#faceGr)"/>

        <!-- Tick marks: E (left) → F (right), 270° arc from -135° to +135° -->
        <g stroke="#c4a661" stroke-width="1.6" fill="none">
          <!-- 11 major ticks across 270° -->
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(-135 100 100)"/>
          <line x1="100" y1="22" x2="100" y2="30" transform="rotate(-108 100 100)" stroke-width="1"/>
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(-81 100 100)"/>
          <line x1="100" y1="22" x2="100" y2="30" transform="rotate(-54 100 100)" stroke-width="1"/>
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(-27 100 100)"/>
          <line x1="100" y1="22" x2="100" y2="34" transform="rotate(0 100 100)" stroke="#e8e6df" stroke-width="2"/>
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(27 100 100)"/>
          <line x1="100" y1="22" x2="100" y2="30" transform="rotate(54 100 100)" stroke-width="1"/>
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(81 100 100)"/>
          <line x1="100" y1="22" x2="100" y2="30" transform="rotate(108 100 100)" stroke-width="1"/>
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(135 100 100)"/>
        </g>

        <!-- Labels E and F -->
        <text x="44" y="158" font-family="Cormorant Garamond" font-size="16" font-weight="700" fill="#c4a661">E</text>
        <text x="148" y="158" font-family="Cormorant Garamond" font-size="16" font-weight="700" fill="#c4a661">F</text>

        <!-- Red zone near empty -->
        <path d="M 33 145 A 80 80 0 0 1 28 100" fill="none" stroke="#c84141" stroke-width="3" stroke-linecap="round"/>

        <!-- Needle: 43% → angle = -135 + (0.43 * 270) = -19° -->
        <g transform="rotate(-19 100 100)">
          <polygon points="100,30 96,108 104,108" fill="#e8e6df"/>
          <polygon points="100,108 95,118 105,118" fill="#c4a661"/>
        </g>
        <circle cx="100" cy="100" r="8" fill="#1a1c20" stroke="#c4a661" stroke-width="1.5"/>
        <circle cx="100" cy="100" r="3" fill="#c4a661"/>

        <!-- Glass shine -->
        <ellipse cx="100" cy="60" rx="72" ry="28" fill="url(#glassGr)"/>
      </svg>
      <div class="dial-readout">
        <div class="dial-readout-value">43<span class="u">%</span></div>
        <div class="dial-readout-sub">175 mi range</div>
      </div>
    </div>

    <!-- Oil life dial -->
    <div class="dial-wrap">
      <button class="reset-pill" id="resetOil">Reset</button>
      <div class="dial-label">Oil · 5K</div>
      <svg class="dial-svg" viewBox="0 0 200 200">
        <!-- Same bezel/face as fuel dial -->
        <circle cx="100" cy="100" r="95" fill="url(#bezelGr)"/>
        <circle cx="100" cy="100" r="86" fill="#0a0b0e"/>
        <circle cx="100" cy="100" r="80" fill="url(#faceGr)"/>

        <g stroke="#c4a661" stroke-width="1.6" fill="none">
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(-135 100 100)"/>
          <line x1="100" y1="22" x2="100" y2="30" transform="rotate(-108 100 100)" stroke-width="1"/>
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(-81 100 100)"/>
          <line x1="100" y1="22" x2="100" y2="30" transform="rotate(-54 100 100)" stroke-width="1"/>
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(-27 100 100)"/>
          <line x1="100" y1="22" x2="100" y2="34" transform="rotate(0 100 100)" stroke="#e8e6df" stroke-width="2"/>
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(27 100 100)"/>
          <line x1="100" y1="22" x2="100" y2="30" transform="rotate(54 100 100)" stroke-width="1"/>
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(81 100 100)"/>
          <line x1="100" y1="22" x2="100" y2="30" transform="rotate(108 100 100)" stroke-width="1"/>
          <line x1="100" y1="22" x2="100" y2="32" transform="rotate(135 100 100)"/>
        </g>

        <text x="40" y="158" font-family="Cormorant Garamond" font-size="13" font-weight="700" fill="#c84141">DUE</text>
        <text x="148" y="158" font-family="Cormorant Garamond" font-size="13" font-weight="700" fill="#4a9c5a">5K</text>

        <path d="M 33 145 A 80 80 0 0 1 28 100" fill="none" stroke="#c84141" stroke-width="3" stroke-linecap="round"/>

        <!-- Needle at full 5000 mi → far right (+135°) -->
        <g transform="rotate(135 100 100)">
          <polygon points="100,30 96,108 104,108" fill="#e8e6df"/>
          <polygon points="100,108 95,118 105,118" fill="#c4a661"/>
        </g>
        <circle cx="100" cy="100" r="8" fill="#1a1c20" stroke="#c4a661" stroke-width="1.5"/>
        <circle cx="100" cy="100" r="3" fill="#c4a661"/>

        <ellipse cx="100" cy="60" rx="72" ry="28" fill="url(#glassGr)"/>
      </svg>
      <div class="dial-readout">
        <div class="dial-readout-value">5,000<span class="u">MI</span></div>
        <div class="dial-readout-sub">to next change</div>
      </div>
    </div>
  </div>

  <div class="odo-band">
    <span class="odo-label">Odometer</span>
    <span class="odo-value">143,061<span class="u">mi</span></span>
  </div>

  <div class="tires-card">
    <div class="tires-card-label">Tire Pressure · PSI</div>
    <div class="tires-grid">
      <div class="tire-num">69<span>front L</span></div>
      <svg class="truck-hint" viewBox="0 0 56 100" fill="none">
        <rect x="6" y="8" width="44" height="84" rx="4" stroke="rgba(196,166,97,0.3)" stroke-width="1" fill="rgba(196,166,97,0.04)"/>
        <rect x="14" y="14" width="28" height="22" rx="2" stroke="rgba(196,166,97,0.18)" fill="none"/>
        <text x="28" y="62" text-anchor="middle" font-family="Cormorant Garamond" font-size="14" fill="#c4a661" font-weight="700">RAM</text>
      </svg>
      <div class="tire-num">68<span>front R</span></div>
      <div class="tire-num">68<span>rear L</span></div>
      <div class="tire-num">67<span>rear R</span></div>
    </div>
  </div>

  <div class="map-card">
    <iframe loading="lazy" src="https://maps.google.com/maps?q=29.620816,-95.527005&z=14&output=embed"></iframe>
    <div class="map-stamp">Position · 29.6208° N · 95.5270° W</div>
    <a class="map-link" target="_blank" href="https://www.google.com/maps?q=29.620816,-95.527005">Open</a>
  </div>

  <div class="commands">
    <button class="cmd">Lock</button>
    <button class="cmd">Unlock</button>
    <button class="cmd cmd-primary">Start</button>
  </div>
</body>
</html>
