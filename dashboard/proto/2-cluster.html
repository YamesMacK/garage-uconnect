<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<title>Garage · Cluster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0e14;
    --bg-2: #0f141c;
    --panel: #131a23;
    --chrome: linear-gradient(180deg, #2a3340 0%, #1a222e 100%);
    --line: rgba(255, 255, 255, 0.08);
    --line-2: rgba(255, 255, 255, 0.16);
    --fg: #f0f4f8;
    --dim: #6b7886;
    --amber: #ffaa3b;
    --red: #ff4f4f;
    --green: #4dd391;
    --display: 'Bebas Neue', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --body: 'Inter', system-ui, sans-serif;
  }
  body {
    font-family: var(--body);
    background:
      radial-gradient(ellipse at 50% -10%, rgba(255, 170, 59, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 110%, rgba(77, 211, 145, 0.05) 0%, transparent 50%),
      var(--bg);
    background-attachment: fixed;
    color: var(--fg);
    min-height: 100vh;
    padding: max(env(safe-area-inset-top), 18px) 14px max(env(safe-area-inset-bottom), 100px);
    max-width: 480px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }

  /* Top status bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .ign {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
  }
  .topbar-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .topbar-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 0.05em;
  }

  /* Vehicle banner */
  .banner {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .banner::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--amber);
  }
  .banner-name {
    font-family: var(--display);
    font-size: 26px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .banner-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .banner-year {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--amber);
    letter-spacing: 0.18em;
  }
  .banner-vin {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.05em;
  }

  /* Hero odometer */
  .odo {
    background: linear-gradient(135deg, var(--bg-2) 0%, var(--panel) 100%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 18px 16px;
    margin-bottom: 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .odo::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, transparent 0, transparent 20px, rgba(255,255,255,0.015) 20px, rgba(255,255,255,0.015) 21px);
    pointer-events: none;
  }
  .odo-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 4px;
  }
  .odo-value {
    font-family: var(--display);
    font-size: 56px;
    line-height: 0.95;
    color: var(--fg);
    letter-spacing: 2px;
    text-shadow: 0 0 18px rgba(255, 170, 59, 0.18);
  }
  .odo-unit {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 0.2em;
    display: inline-block;
    margin-left: 6px;
    vertical-align: top;
    padding-top: 6px;
  }

  /* Gauges row */
  .gauges {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .gauge {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    position: relative;
  }
  .gauge-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    text-align: center;
    margin-bottom: 6px;
  }
  .gauge-svg {
    width: 100%;
    aspect-ratio: 1.6 / 1;
    display: block;
  }
  .gauge-value {
    font-family: var(--display);
    font-size: 32px;
    text-align: center;
    line-height: 1;
    margin-top: -28px;
    position: relative;
  }
  .gauge-value-pct {
    color: var(--amber);
  }
  .gauge-value-pct.low { color: var(--red); }
  .gauge-value-unit {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.15em;
    margin-left: 3px;
    vertical-align: top;
    padding-top: 4px;
    display: inline-block;
  }
  .gauge-sub {
    text-align: center;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-top: 6px;
  }

  /* Battery & range row */
  .bcards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .bcard {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
  }
  .bcard-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 8px;
  }
  .bcard-value {
    font-family: var(--display);
    font-size: 36px;
    line-height: 1;
    color: var(--fg);
  }
  .bcard-value .u {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    margin-left: 4px;
    letter-spacing: 0.1em;
    vertical-align: top;
    padding-top: 6px;
    display: inline-block;
  }
  .bcard-sub {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-top: 6px;
  }

  /* Tire diagram */
  .tires-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 14px;
    margin-bottom: 12px;
  }
  .tires-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .tires-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }
  .tires-unit {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--amber);
    letter-spacing: 0.15em;
  }
  .tires-grid {
    display: grid;
    grid-template-columns: 1fr 56px 1fr;
    gap: 8px 24px;
    align-items: center;
    justify-items: center;
  }
  .tire-num {
    font-family: var(--display);
    font-size: 28px;
    line-height: 1;
    text-align: center;
  }
  .tire-num span {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--dim);
    display: block;
    letter-spacing: 0.18em;
    margin-top: 3px;
    font-weight: 400;
  }
  .truck-svg {
    grid-row: 1 / 3;
    grid-column: 2;
    width: 100%;
    aspect-ratio: 56 / 100;
  }

  /* Map */
  .map-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 0;
    overflow: hidden;
    height: 200px;
    position: relative;
    margin-bottom: 12px;
  }
  .map-card iframe {
    width: 100%;
    height: 100%;
    border: 0;
  }
  .map-overlay {
    position: absolute;
    top: 10px; left: 12px;
    background: rgba(10, 14, 20, 0.85);
    border: 1px solid var(--line-2);
    backdrop-filter: blur(8px);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--amber);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .map-link {
    position: absolute;
    bottom: 10px; right: 10px;
    background: var(--amber);
    color: #000;
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Sticky command bar */
  .commands {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 14px max(env(safe-area-inset-bottom), 14px);
    background: linear-gradient(180deg, rgba(10,14,20,0) 0%, rgba(10,14,20,0.9) 40%, var(--bg) 100%);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    max-width: 480px;
    margin: 0 auto;
  }
  .cmd {
    background: var(--chrome);
    border: 1px solid var(--line-2);
    color: var(--fg);
    font-family: var(--display);
    font-size: 16px;
    letter-spacing: 2px;
    padding: 14px 0;
    border-radius: 10px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 4px 12px rgba(0,0,0,0.4);
  }
  .cmd:active { transform: scale(0.97); filter: brightness(0.85); }
  .cmd-primary {
    background: linear-gradient(180deg, #ff8a1f 0%, #c75500 100%);
    border-color: #ff9c3b;
    color: #1a0a00;
  }
  .cmd-primary:active { filter: brightness(0.85); }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <span class="ign"></span>
      <span class="topbar-label">Engine off · Online</span>
    </div>
    <span class="topbar-time">2 MIN AGO</span>
  </div>

  <div class="banner">
    <span class="banner-name">RAM 2500</span>
    <div class="banner-meta">
      <span class="banner-year">M.Y. 2022</span>
      <span class="banner-vin">3C6UR5FJ6NG305274</span>
    </div>
  </div>

  <div class="odo">
    <div class="odo-label">Odometer</div>
    <span class="odo-value">143,061<span class="odo-unit">MI</span></span>
  </div>

  <div class="gauges">
    <div class="gauge">
      <div class="gauge-label">Fuel</div>
      <svg class="gauge-svg" viewBox="0 0 160 100">
        <defs>
          <linearGradient id="fuelg" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%" stop-color="#ff4f4f"/>
            <stop offset="40%" stop-color="#ffaa3b"/>
            <stop offset="100%" stop-color="#4dd391"/>
          </linearGradient>
        </defs>
        <path d="M 20 90 A 60 60 0 0 1 140 90" fill="none" stroke="#1f2733" stroke-width="10" stroke-linecap="round"/>
        <path d="M 20 90 A 60 60 0 0 1 76 30" fill="none" stroke="url(#fuelg)" stroke-width="10" stroke-linecap="round"/>
        <circle cx="76" cy="30" r="5" fill="#ffaa3b"/>
      </svg>
      <div class="gauge-value"><span class="gauge-value-pct">43</span><span class="gauge-value-unit">%</span></div>
      <div class="gauge-sub">175 mi range</div>
    </div>

    <div class="gauge">
      <div class="gauge-label">Oil life · 5K</div>
      <svg class="gauge-svg" viewBox="0 0 160 100">
        <path d="M 20 90 A 60 60 0 0 1 140 90" fill="none" stroke="#1f2733" stroke-width="10" stroke-linecap="round"/>
        <path d="M 20 90 A 60 60 0 0 1 140 90" fill="none" stroke="#4dd391" stroke-width="10" stroke-linecap="round"/>
        <circle cx="140" cy="90" r="5" fill="#4dd391"/>
      </svg>
      <div class="gauge-value" style="color:var(--green)">5,000<span class="gauge-value-unit">MI</span></div>
      <div class="gauge-sub">to next change</div>
    </div>
  </div>

  <div class="bcards">
    <div class="bcard">
      <div class="bcard-label">Range</div>
      <div class="bcard-value">175<span class="u">MI</span></div>
      <div class="bcard-sub">on 43% fuel</div>
    </div>
    <div class="bcard">
      <div class="bcard-label">Battery</div>
      <div class="bcard-value">13.7<span class="u">V</span></div>
      <div class="bcard-sub" style="color:var(--green)">healthy</div>
    </div>
  </div>

  <div class="tires-card">
    <div class="tires-head">
      <span class="tires-label">Tire pressure</span>
      <span class="tires-unit">PSI</span>
    </div>
    <div class="tires-grid">
      <div class="tire-num">69<span>FRONT L</span></div>
      <svg class="truck-svg" viewBox="0 0 56 100" fill="none">
        <rect x="6" y="8" width="44" height="84" rx="4" stroke="rgba(255,255,255,0.16)" stroke-width="1" fill="rgba(255,255,255,0.02)"/>
        <rect x="14" y="14" width="28" height="22" rx="2" stroke="rgba(255,255,255,0.18)" fill="rgba(255,170,59,0.04)"/>
        <text x="28" y="62" text-anchor="middle" font-family="Bebas Neue" font-size="14" fill="#ffaa3b" letter-spacing="2">RAM</text>
      </svg>
      <div class="tire-num">68<span>FRONT R</span></div>
      <div class="tire-num">68<span>REAR L</span></div>
      <div class="tire-num">67<span>REAR R</span></div>
    </div>
  </div>

  <div class="map-card">
    <iframe loading="lazy" src="https://maps.google.com/maps?q=29.620816,-95.527005&z=14&output=embed"></iframe>
    <div class="map-overlay">29.6208° N · 95.5270° W</div>
    <a class="map-link" target="_blank" href="https://www.google.com/maps?q=29.620816,-95.527005">Open</a>
  </div>

  <div class="commands">
    <button class="cmd">Lock</button>
    <button class="cmd">Unlock</button>
    <button class="cmd cmd-primary">Start</button>
  </div>
</body>
</html>
