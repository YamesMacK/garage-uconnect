<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Garage · Minimal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #000;
    --fg: #fafafa;
    --dim: #6a6a6a;
    --line: #1a1a1a;
    --accent: #5b9eff;
    --warn: #ff9c4a;
    --bad: #ff5b5b;
    --good: #4ade80;
  }
  body {
    font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    padding: max(env(safe-area-inset-top), 28px) 24px max(env(safe-area-inset-bottom), 100px);
    max-width: 480px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'tnum';
  }

  .head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.16em;
  }
  .live {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--good);
    font-weight: 500;
  }
  .live::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--good);
    box-shadow: 0 0 8px var(--good);
  }

  .vehicle {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line);
  }
  .vehicle h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .vehicle .year {
    font-size: 14px;
    color: var(--dim);
    font-weight: 500;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 18px 0;
    border-bottom: 1px solid var(--line);
  }
  .row-label {
    font-size: 12px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
  }
  .row-value {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.025em;
    font-feature-settings: 'tnum';
  }
  .row-value .unit {
    font-size: 13px;
    color: var(--dim);
    font-weight: 500;
    margin-left: 4px;
    letter-spacing: 0;
  }
  .row-sub {
    display: block;
    font-size: 11px;
    color: var(--dim);
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  /* Bar inside a row */
  .row-bar-wrap {
    width: 100%;
    margin-top: 14px;
  }
  .row-bar {
    height: 2px;
    background: var(--line);
    border-radius: 1px;
    overflow: hidden;
  }
  .row-bar > span {
    display: block;
    height: 100%;
    background: var(--accent);
    transition: width 0.5s ease;
  }
  .row-bar.warn > span { background: var(--warn); }
  .row-bar.bad > span { background: var(--bad); }

  /* Tires — 4 small rows */
  .tires {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 32px;
    padding: 14px 0 4px;
  }
  .tire {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .tire-pos {
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 500;
  }
  .tire-val {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .tire-val .unit {
    font-size: 11px;
    color: var(--dim);
    margin-left: 2px;
    font-weight: 500;
  }

  /* Map */
  .map-section {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }
  .map-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }
  .map-link {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
  }
  .map {
    height: 220px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: #0a0a0a;
  }
  .map iframe {
    width: 100%;
    height: 100%;
    border: 0;
    filter: invert(0.92) hue-rotate(180deg) saturate(0.4) brightness(0.95);
  }

  /* Sticky command bar */
  .commands {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px 24px max(env(safe-area-inset-bottom), 18px);
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 30%, var(--bg) 60%);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    gap: 8px;
    max-width: 480px;
    margin: 0 auto;
  }
  .cmd {
    flex: 1;
    background: #151515;
    border: 1px solid #2a2a2a;
    color: var(--fg);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 14px 0;
    border-radius: 12px;
    cursor: pointer;
  }
  .cmd:active { background: #1f1f1f; transform: scale(0.97); }
  .cmd-primary {
    background: var(--fg);
    border-color: var(--fg);
    color: #000;
  }
  .cmd-primary:active { background: #d4d4d4; }
</style>
</head>
<body>
  <div class="head">
    <span class="badge">Garage · 1/3</span>
    <span class="live">Live · 2 min ago</span>
  </div>

  <div class="vehicle">
    <h1>Ram 2500</h1>
    <span class="year">2022</span>
  </div>

  <div class="row">
    <span class="row-label">Odometer</span>
    <span class="row-value">143,061<span class="unit">MI</span></span>
  </div>

  <div class="row">
    <div>
      <span class="row-label">Range</span>
      <span class="row-sub">Fuel · 43%</span>
    </div>
    <div style="text-align:right">
      <span class="row-value">175<span class="unit">MI</span></span>
      <div class="row-bar-wrap"><div class="row-bar"><span style="width:43%"></span></div></div>
    </div>
  </div>

  <div class="row">
    <div>
      <span class="row-label">Oil change</span>
      <span class="row-sub">5,000 mi interval</span>
    </div>
    <span class="row-value" style="color:var(--accent)">5,000<span class="unit">MI</span></span>
  </div>

  <div class="row">
    <span class="row-label">Battery</span>
    <span class="row-value">13.7<span class="unit">V</span></span>
  </div>

  <div class="tires" style="border-bottom: 1px solid var(--line); padding-bottom: 14px;">
    <div class="tire"><span class="tire-pos">FL</span><span class="tire-val">69<span class="unit">PSI</span></span></div>
    <div class="tire"><span class="tire-pos">FR</span><span class="tire-val">68<span class="unit">PSI</span></span></div>
    <div class="tire"><span class="tire-pos">RL</span><span class="tire-val">68<span class="unit">PSI</span></span></div>
    <div class="tire"><span class="tire-pos">RR</span><span class="tire-val">67<span class="unit">PSI</span></span></div>
  </div>

  <div class="map-section">
    <div class="map-head">
      <span class="row-label">Position</span>
      <a class="map-link" target="_blank" href="https://www.google.com/maps?q=29.620816,-95.527005">Open ↗</a>
    </div>
    <div class="map">
      <iframe loading="lazy" src="https://maps.google.com/maps?q=29.620816,-95.527005&z=14&output=embed"></iframe>
    </div>
  </div>

  <div class="commands">
    <button class="cmd">Lock</button>
    <button class="cmd">Unlock</button>
    <button class="cmd cmd-primary">Start</button>
  </div>
</body>
</html>
