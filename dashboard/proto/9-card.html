<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a141a">
<title>Ram Truck 2500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #08121a;
    --card: #0e1c24;
    --tile: rgba(232, 220, 196, 0.025);
    --tile-2: rgba(232, 220, 196, 0.04);
    --line: rgba(232, 220, 196, 0.08);
    --line-2: rgba(232, 220, 196, 0.14);
    --cream: #e8d8b4;
    --cream-2: #f4e6c4;
    --dim: #8a7d65;
    --amber: #d68a3a;
    --amber-2: #f0a850;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
  }
  body {
    font-family: var(--sans);
    background:
      radial-gradient(ellipse at 50% 30%, rgba(214, 138, 58, 0.04) 0%, transparent 60%),
      var(--bg);
    background-attachment: fixed;
    color: var(--cream);
    min-height: 100vh;
    padding: max(env(safe-area-inset-top), 30px) 18px max(env(safe-area-inset-bottom), 30px);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'tnum';
  }

  /* The whole dashboard is one big card */
  .card {
    max-width: 380px;
    margin: 0 auto;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(214, 138, 58, 0.05) 0%, transparent 55%),
      linear-gradient(170deg, #112028 0%, #0a141a 70%, #08121a 100%);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 26px 22px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
  }

  /* Header */
  .header {
    text-align: center;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 16px;
  }
  .title {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--cream-2);
    line-height: 1;
    margin-bottom: 6px;
  }
  .sync {
    font-family: var(--sans);
    font-size: 9.5px;
    font-weight: 600;
    color: var(--dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* Grid of tiles */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .tile {
    background: var(--tile);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 14px 13px;
    position: relative;
    overflow: hidden;
  }
  .tile-wide { grid-column: span 2; }
  .tile-label {
    font-family: var(--sans);
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .tile-value {
    font-family: var(--sans);
    font-size: 30px;
    font-weight: 800;
    line-height: 1;
    color: var(--cream-2);
    letter-spacing: -0.025em;
  }
  .tile-value.amber { color: var(--amber-2); }
  .tile-value .u {
    font-size: 12px;
    color: var(--dim);
    font-weight: 600;
    letter-spacing: 0;
    margin-left: 3px;
    vertical-align: top;
    padding-top: 4px;
    display: inline-block;
  }
  .tile-sub {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--dim);
    margin-top: 8px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .tile-sub.warn {
    color: var(--amber);
    font-weight: 600;
  }

  /* Half-round fuel gauge inside Range tile */
  .range-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .range-text { flex: 1; }
  .fuel-arc {
    width: 78px;
    height: 56px;
    flex-shrink: 0;
    position: relative;
  }
  .fuel-arc svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .fuel-arc-track  { stroke: rgba(232, 220, 196, 0.08); }
  .fuel-arc-fill   { stroke: url(#fuelArcGr); stroke-linecap: round; }
  .fuel-arc-pct {
    position: absolute;
    left: 0; right: 0;
    bottom: 2px;
    text-align: center;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 800;
    color: var(--cream-2);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .fuel-arc-pct .u {
    font-size: 9px;
    color: var(--dim);
    font-weight: 600;
    margin-left: 1px;
    vertical-align: top;
  }

  /* Reset pill */
  .reset {
    position: absolute;
    top: 12px; right: 12px;
    background: transparent;
    border: 1px solid rgba(214, 138, 58, 0.5);
    color: var(--amber-2);
    font-family: var(--sans);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 100px;
    cursor: pointer;
  }
  .reset:active { background: rgba(214, 138, 58, 0.12); }

  /* Tire layout — 4 corners with truck photo in the middle */
  .tires-corners {
    display: grid;
    grid-template-columns: 1fr 70px 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 16px 18px;
    align-items: center;
    margin-top: 8px;
    padding: 4px 0;
  }
  .truck-photo {
    grid-row: 1 / 3;
    grid-column: 2;
    width: 70px;
    height: auto;
    aspect-ratio: 150 / 372;
    object-fit: contain;
    display: block;
    margin: 0 auto;
    filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.55));
  }
  .tire-cell {
    text-align: center;
  }
  .tire-cell.tl, .tire-cell.bl { text-align: right; }
  .tire-cell.tr, .tire-cell.br { text-align: left; }
  .tire-pos {
    display: block;
    font-family: var(--sans);
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .tire-num {
    font-family: var(--sans);
    font-size: 24px;
    font-weight: 800;
    color: var(--cream-2);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .tire-num .u {
    font-size: 10px;
    color: var(--dim);
    font-weight: 600;
    margin-left: 2px;
    letter-spacing: 0;
  }

  /* Location tile — full-width with map */
  .loc-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .loc-place {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    color: var(--cream-2);
    letter-spacing: -0.01em;
  }
  .loc-map {
    height: 160px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--line);
    position: relative;
    background: #000;
  }
  .loc-map iframe {
    width: 100%;
    height: 100%;
    border: 0;
    filter: invert(0.92) hue-rotate(180deg) saturate(0.5) brightness(0.95);
  }
  .loc-link {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(8, 18, 26, 0.85);
    border: 1px solid var(--line-2);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: var(--cream);
    padding: 4px 9px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  .loc-coords {
    font-family: var(--sans);
    font-size: 10px;
    color: var(--dim);
    margin-top: 8px;
    letter-spacing: 0.04em;
    text-align: right;
  }

  /* Action row at the bottom */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
  }
  .btn {
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--cream);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 14px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:active { background: var(--tile-2); transform: scale(0.97); }
  .btn-primary {
    background: var(--amber);
    border-color: var(--amber-2);
    color: #1a0d04;
    box-shadow: 0 4px 14px rgba(214, 138, 58, 0.25);
  }
  .btn-primary:active { background: var(--amber-2); }

  /* Loading state — replaces button label with a spinner for ~3s */
  .btn[disabled] { opacity: 1; cursor: default; }
  .btn .label { display: inline-block; }
  .btn .spinner { display: none; }
  .btn.loading .label { display: none; }
  .btn.loading .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: btn-spin 0.7s linear infinite;
    vertical-align: -3px;
  }
  @keyframes btn-spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="title">Ram Truck 2500</div>
      <div class="sync">Synced 2m ago</div>
    </div>

    <div class="grid">
      <!-- Odometer -->
      <div class="tile">
        <div class="tile-label">Odometer</div>
        <div class="tile-value">142,990<span class="u">mi</span></div>
      </div>

      <!-- Range with half-round fuel gauge -->
      <div class="tile">
        <div class="tile-label">Range</div>
        <div class="range-row">
          <div class="range-text">
            <div class="tile-value">248<span class="u">mi</span></div>
            <div class="tile-sub">Fuel</div>
          </div>
          <div class="fuel-arc">
            <svg viewBox="0 0 100 60">
              <defs>
                <linearGradient id="fuelArcGr" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#d68a3a"/>
                  <stop offset="100%" stop-color="#f0a850"/>
                </linearGradient>
              </defs>
              <!-- arc length = π·42 = 131.95; 65% = 85.77 -->
              <path d="M 8 50 A 42 42 0 0 1 92 50"
                    fill="none" class="fuel-arc-track" stroke-width="6"/>
              <path d="M 8 50 A 42 42 0 0 1 92 50"
                    fill="none" class="fuel-arc-fill" stroke-width="6"
                    stroke-dasharray="85.77 131.95"/>
            </svg>
            <div class="fuel-arc-pct">65<span class="u">%</span></div>
          </div>
        </div>
      </div>

      <!-- Oil (with reset) -->
      <div class="tile">
        <button class="reset" id="resetOil">Reset</button>
        <div class="tile-label">Oil · 5K</div>
        <div class="tile-value amber">5,000<span class="u">mi</span></div>
        <div class="tile-sub">to next change</div>
      </div>

      <!-- Battery -->
      <div class="tile">
        <div class="tile-label">Battery</div>
        <div class="tile-value">13.6<span class="u">V</span></div>
        <div class="tile-sub">healthy</div>
      </div>

      <!-- Tire PSI (wide — 4 corners with top-down truck silhouette) -->
      <div class="tile tile-wide">
        <div class="tile-label">Tire PSI</div>
        <div class="tires-corners">
          <div class="tire-cell tl">
            <span class="tire-pos">FL</span>
            <span class="tire-num">70</span>
          </div>
          <img class="truck-photo"
               src="../img/truck-top.png"
               alt="Top-down view of Ram 2500"
               loading="lazy"/>
          <div class="tire-cell tr">
            <span class="tire-pos">FR</span>
            <span class="tire-num">70</span>
          </div>
          <div class="tire-cell bl">
            <span class="tire-pos">RL</span>
            <span class="tire-num">69</span>
          </div>
          <div class="tire-cell br">
            <span class="tire-pos">RR</span>
            <span class="tire-num">69</span>
          </div>
        </div>
      </div>

      <!-- Location (wide) with Google Map -->
      <div class="tile tile-wide">
        <div class="loc-head">
          <span class="tile-label" style="margin-bottom: 0;">Location</span>
          <span class="loc-place">Conroe, TX</span>
        </div>
        <div class="loc-map">
          <iframe loading="lazy" src="https://maps.google.com/maps?q=30.397,-95.555&z=14&output=embed"></iframe>
          <a class="loc-link" target="_blank" href="https://www.google.com/maps?q=30.397,-95.555">Open ↗</a>
        </div>
        <div class="loc-coords">30.397, −95.555</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn"><span class="label">Lock</span><span class="spinner"></span></button>
      <button class="btn"><span class="label">Unlock</span><span class="spinner"></span></button>
      <button class="btn btn-primary"><span class="label">Start</span><span class="spinner"></span></button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('loading')) return;
        btn.classList.add('loading');
        btn.disabled = true;
        setTimeout(() => {
          btn.classList.remove('loading');
          btn.disabled = false;
        }, 3000);
      });
    });
  </script>
</body>
</html>
