<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<title>Garage · Map-first</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0c;
    --glass: rgba(20, 22, 28, 0.72);
    --glass-strong: rgba(28, 32, 40, 0.85);
    --line: rgba(255, 255, 255, 0.10);
    --line-2: rgba(255, 255, 255, 0.18);
    --fg: #f5f6f8;
    --dim: #8a909a;
    --accent: #ffaa3b;
    --good: #4dd391;
    --bad: #ff5a5a;
    --warn: #ffaa3b;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    position: relative;
    height: 100vh;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Map fills the entire screen — content overlays on top */
  .map {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .map iframe {
    width: 100%;
    height: 100%;
    border: 0;
    /* Subtle dark filter to blend into UI */
    filter: brightness(0.85) saturate(0.9);
  }

  /* Top status pill */
  .topbar {
    position: absolute;
    top: max(env(safe-area-inset-top), 14px);
    left: 14px;
    right: 14px;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .pill {
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 8px 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
  }
  .pill-vehicle { font-weight: 700; }
  .pill-vehicle-year {
    color: var(--dim);
    font-weight: 500;
    font-size: 12px;
  }
  .pill-live::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--good);
    box-shadow: 0 0 8px var(--good);
  }
  .pill-live { font-size: 12px; }
  .pill-time { color: var(--dim); font-size: 11px; font-weight: 500; }

  /* Floating command buttons over the map */
  .fab-stack {
    position: absolute;
    right: 14px;
    top: 80px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .fab {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: var(--glass-strong);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--line-2);
    color: var(--fg);
    cursor: pointer;
    display: grid;
    place-items: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    transition: transform 0.1s;
  }
  .fab:active { transform: scale(0.92); }
  .fab svg { width: 22px; height: 22px; }
  .fab-primary {
    background: linear-gradient(135deg, #ff8a1f 0%, #d65a00 100%);
    border-color: rgba(255, 154, 50, 0.6);
    color: #1a0a00;
    box-shadow: 0 6px 20px rgba(255, 138, 31, 0.4);
  }
  .fab-label {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--glass-strong);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--line);
    padding: 4px 9px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
  }
  .fab-row { position: relative; }
  .fab-row .fab-label-static {
    position: static;
    transform: none;
    opacity: 1;
    margin-right: 10px;
    align-self: center;
    color: var(--dim);
  }

  /* Bottom sheet — scrollable */
  .sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 5;
    background: linear-gradient(180deg, rgba(10, 10, 12, 0) 0%, rgba(10, 10, 12, 0.95) 18%, var(--bg) 30%);
    padding: 80px 14px max(env(safe-area-inset-bottom), 16px);
    max-height: 56dvh;
    overflow-y: auto;
  }
  .sheet-handle {
    position: absolute;
    top: 36px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
  }

  /* Hero numbers row inside sheet */
  .hero {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .tile {
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 14px 12px;
  }
  .tile-label {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .tile-value {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    font-feature-settings: 'tnum';
  }
  .tile-value .u {
    font-size: 12px;
    color: var(--dim);
    font-weight: 500;
    margin-left: 3px;
    letter-spacing: 0;
  }
  .tile-sub {
    font-size: 11px;
    color: var(--dim);
    margin-top: 6px;
    font-weight: 500;
  }
  .bar {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .bar > span {
    display: block;
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }
  .bar.warn > span { background: var(--warn); }
  .bar.bad  > span { background: var(--bad); }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .mini {
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
  }
  .mini-label {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .mini-value {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    font-feature-settings: 'tnum';
  }
  .mini-value .u {
    font-size: 10px;
    color: var(--dim);
    font-weight: 500;
    margin-left: 2px;
  }

  .tires-tile {
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .tires-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tires-row + .tires-row { margin-top: 8px; }
  .tires-row > span:first-child {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 600;
  }
  .tires-row > span:last-child {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
    font-feature-settings: 'tnum';
  }
  .tires-row > span:last-child .u {
    font-size: 10px;
    color: var(--dim);
    font-weight: 500;
    margin-left: 2px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="map">
    <iframe loading="lazy" src="https://maps.google.com/maps?q=29.620816,-95.527005&z=15&output=embed"></iframe>
  </div>

  <div class="topbar">
    <div class="pill pill-vehicle">Ram 2500 <span class="pill-vehicle-year">· 2022</span></div>
    <div class="pill pill-live">Live<span class="pill-time">2m</span></div>
  </div>

  <div class="fab-stack">
    <button class="fab" aria-label="Lock">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </button>
    <button class="fab" aria-label="Unlock">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
    </button>
    <button class="fab fab-primary" aria-label="Remote start">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v8"/><path d="M5.6 6.6a8 8 0 1 0 12.8 0"/></svg>
    </button>
  </div>

  <div class="sheet">
    <div class="sheet-handle"></div>

    <div class="hero">
      <div class="tile">
        <div class="tile-label">Odometer</div>
        <div class="tile-value">143,061<span class="u">MI</span></div>
        <div class="tile-sub">5,000 mi to next oil change</div>
      </div>
      <div class="tile">
        <div class="tile-label">Range</div>
        <div class="tile-value">175<span class="u">MI</span></div>
        <div class="bar"><span style="width:43%"></span></div>
        <div class="tile-sub">Fuel · 43%</div>
      </div>
    </div>

    <div class="grid-3">
      <div class="mini">
        <div class="mini-label">Battery</div>
        <div class="mini-value">13.7<span class="u">V</span></div>
      </div>
      <div class="mini">
        <div class="mini-label">Oil · 5K</div>
        <div class="mini-value" style="color:var(--good)">5K<span class="u">MI</span></div>
      </div>
      <div class="mini">
        <div class="mini-label">Fuel</div>
        <div class="mini-value">43<span class="u">%</span></div>
      </div>
    </div>

    <div class="tires-tile">
      <div class="tile-label" style="margin-bottom:8px;">Tire Pressure</div>
      <div class="tires-row"><span>Front L</span><span>69<span class="u">PSI</span></span></div>
      <div class="tires-row"><span>Front R</span><span>68<span class="u">PSI</span></span></div>
      <div class="tires-row"><span>Rear L</span><span>68<span class="u">PSI</span></span></div>
      <div class="tires-row"><span>Rear R</span><span>67<span class="u">PSI</span></span></div>
    </div>
  </div>
</div>
</body>
</html>
