<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#08121a">
<title>Ram Truck 2500</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #08121a;
    --card: #0d1820;
    --tile: rgba(232, 220, 196, 0.025);
    --tile-2: rgba(232, 220, 196, 0.04);
    --line: rgba(232, 220, 196, 0.08);
    --line-2: rgba(232, 220, 196, 0.14);
    --cream: #e8d8b4;
    --cream-2: #f4e6c4;
    --white: #fcfaf3;
    --dim: #8a7d65;
    --dim-2: #5a4f3e;
    --amber: #d68a3a;
    --amber-2: #f0a850;
    --green: #6dd391;
    --warn: #d44a2b;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
  }
  body {
    font-family: var(--sans);
    background:
      radial-gradient(ellipse at 50% 30%, rgba(214, 138, 58, 0.04) 0%, transparent 60%),
      var(--bg);
    background-attachment: fixed;
    color: var(--cream);
    min-height: 100vh;
    padding: max(env(safe-area-inset-top), 22px) 14px max(env(safe-area-inset-bottom), 22px);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'tnum';
  }

  /* The whole dashboard is one big card */
  .card {
    max-width: 400px;
    margin: 0 auto;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(214, 138, 58, 0.04) 0%, transparent 55%),
      linear-gradient(170deg, #0e1820 0%, #0a141a 70%, #08121a 100%);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 22px 18px 18px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
  }

  /* Header — left-aligned title with hero truck on the right */
  .header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    padding-bottom: 16px;
    margin-bottom: 14px;
  }
  .header-text {
    min-width: 0;
  }
  .title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.025em;
    color: var(--white);
    line-height: 1;
    margin-bottom: 8px;
  }
  .sync {
    font-size: 10px;
    font-weight: 700;
    color: var(--amber-2);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .sync.stale { color: var(--warn); }
  .hero-truck {
    width: 170px;
    height: auto;
    aspect-ratio: 360 / 172;
    object-fit: contain;
    border-radius: 8px;
    filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.55));
  }
  .hero-wrap {
    width: 170px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .tile {
    background: var(--tile);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    position: relative;
    overflow: hidden;
  }
  .tile-wide { grid-column: span 2; }
  .tile-icon {
    position: absolute;
    top: 12px; right: 12px;
    width: 22px; height: 22px;
    opacity: 0.9;
  }
  .tile-icon.amber { color: var(--amber-2); }
  .tile-icon.green { color: var(--green); }
  .tile-label {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .tile-value {
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    color: var(--white);
    letter-spacing: -0.03em;
  }
  .tile-value.amber { color: var(--amber-2); }
  .tile-value.warn { color: var(--warn); }
  .tile-value .u {
    font-size: 13px;
    color: var(--dim);
    font-weight: 600;
    letter-spacing: 0;
    margin-left: 4px;
    vertical-align: baseline;
    display: inline-block;
  }
  .tile-sub {
    font-size: 11px;
    color: var(--dim);
    margin-top: 8px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .tile-sub.warn { color: var(--warn); font-weight: 600; }
  .tile-sub.healthy { color: var(--green); font-weight: 600; }

  /* Half-round fuel gauge inside Range tile */
  .range-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .range-text { flex: 1; }
  .fuel-arc {
    width: 96px;
    height: 64px;
    flex-shrink: 0;
    position: relative;
  }
  .fuel-arc svg { width: 100%; height: 100%; display: block; }
  .fuel-arc-track  { stroke: rgba(232, 220, 196, 0.08); }
  .fuel-arc-fill   { stroke: url(#fuelArcGr); stroke-linecap: round; }
  .fuel-arc-pct {
    position: absolute;
    left: 0; right: 0; bottom: -2px;
    text-align: center;
    font-size: 17px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .fuel-arc-pct .u {
    font-size: 10px;
    color: var(--dim);
    font-weight: 600;
    margin-left: 1px;
  }
  .fuel-arc-label {
    text-align: center;
    font-size: 10px;
    color: var(--dim);
    margin-top: 12px;
    letter-spacing: 0.04em;
  }

  /* Reset pill — bottom of Oil tile */
  .reset {
    background: transparent;
    border: 1px solid rgba(214, 138, 58, 0.5);
    color: var(--amber-2);
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 100px;
    cursor: pointer;
    margin-top: 8px;
    align-self: flex-start;
  }
  .reset:active { background: rgba(214, 138, 58, 0.12); }
  .reset[disabled] { opacity: 0.5; cursor: default; }
  .oil-tile { display: flex; flex-direction: column; }

  /* Tire layout — 4 corners with truck photo in the middle */
  .tires-corners {
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 18px 18px;
    align-items: center;
    margin-top: 6px;
    padding: 4px 0;
  }
  .truck-photo {
    grid-row: 1 / 3;
    grid-column: 2;
    width: 80px;
    height: auto;
    aspect-ratio: 150 / 372;
    object-fit: contain;
    display: block;
    margin: 0 auto;
    filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.55));
  }
  .tire-cell { text-align: center; }
  .tire-cell.tl, .tire-cell.bl { text-align: right; }
  .tire-cell.tr, .tire-cell.br { text-align: left; }
  .tire-pos {
    display: block;
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .tire-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--white);
    line-height: 1;
    letter-spacing: -0.025em;
  }
  .tire-num.warn { color: var(--warn); }

  /* Location with Google Map */
  .loc-place {
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.01em;
    margin-top: 4px;
  }
  .loc-map {
    height: 200px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--line);
    position: relative;
    background: #000;
    margin-top: 10px;
  }
  .loc-map iframe {
    width: 100%;
    height: 100%;
    border: 0;
    filter: invert(0.92) hue-rotate(180deg) saturate(0.5) brightness(0.95);
  }
  .loc-link {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(8, 18, 26, 0.85);
    border: 1px solid var(--line-2);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: var(--cream);
    padding: 4px 9px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  .loc-coords {
    position: absolute;
    bottom: 8px; left: 8px;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.04em;
    font-feature-settings: 'tnum';
    background: rgba(8, 18, 26, 0.6);
    padding: 3px 6px;
    border-radius: 4px;
  }

  /* Action row — Lock + Unlock only (no paid Remote Start) */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .btn {
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--cream);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 14px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:active { background: var(--tile-2); transform: scale(0.97); }
  .btn[disabled] { opacity: 0.5; cursor: default; }
  .btn svg { width: 16px; height: 16px; }

  /* Spinner feedback */
  .btn .label-wrap { display: inline-flex; align-items: center; gap: 8px; }
  .btn .spinner { display: none; }
  .btn.loading .label-wrap { display: none; }
  .btn.loading .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: btn-spin 0.7s linear infinite;
  }
  @keyframes btn-spin { to { transform: rotate(360deg); } }

  /* Settings panel */
  .panel {
    display: none;
    background: var(--tile-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    margin-top: 12px;
    flex-direction: column;
    gap: 10px;
  }
  .panel.show { display: flex; }
  .panel-label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .panel input {
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--line);
    color: var(--cream);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 6px;
    outline: none;
    width: 100%;
  }
  .panel input:focus { border-color: rgba(240, 168, 80, 0.5); }
  .panel-help { font-size: 11px; color: var(--dim); line-height: 1.5; }
  .panel-row { display: flex; gap: 6px; }
  .panel-row .btn {
    flex: 1; padding: 10px 0; font-size: 11px; letter-spacing: 0.10em;
  }

  /* Footer */
  .foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 4px 0;
    font-size: 10px;
    color: var(--dim-2);
    letter-spacing: 0.04em;
  }
  .foot .vin { font-feature-settings: 'tnum'; font-weight: 600; }
  .foot button {
    background: transparent;
    border: none;
    color: var(--dim);
    font-family: inherit;
    font-size: 10px;
    text-decoration: underline;
    cursor: pointer;
    padding: 4px 0;
    letter-spacing: 0.04em;
  }
  .foot .sep { color: var(--dim-2); margin: 0 4px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #142028;
    border: 1px solid var(--line-2);
    color: var(--cream);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    max-width: 320px;
    text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .empty {
    text-align: center;
    padding: 40px 16px;
    color: var(--dim);
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header-text">
        <div class="title" id="title">Ram Truck 2500</div>
        <div class="sync" id="sync">loading…</div>
      </div>
      <div class="hero-wrap">
        <img class="hero-truck" src="img/hero-truck.png" alt="2022 Ram 2500">
      </div>
    </div>

    <div id="grid" class="grid">
      <div class="empty" style="grid-column: span 2;">Awaiting first sync…</div>
    </div>

    <div class="actions">
      <button class="btn" data-cmd="lock">
        <span class="label-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
          <span class="label">Lock</span>
        </span>
        <span class="spinner"></span>
      </button>
      <button class="btn" data-cmd="unlock">
        <span class="label-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 7.9-1"/></svg>
          <span class="label">Unlock</span>
        </span>
        <span class="spinner"></span>
      </button>
    </div>

    <div class="panel" id="settings">
      <div class="panel-label">GitHub Token</div>
      <input id="patInput" type="password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="github_pat_…">
      <div class="panel-help">
        Fine-grained PAT with <em>Actions: Read &amp; Write</em> on this repo.
        Stored in your browser only. Required for Lock / Unlock / Reset Oil.
      </div>
      <div class="panel-row">
        <button class="btn" id="patSave"><span class="label-wrap"><span class="label">Save</span></span></button>
        <button class="btn" id="patClear"><span class="label-wrap"><span class="label">Clear</span></span></button>
        <button class="btn" id="patClose"><span class="label-wrap"><span class="label">Close</span></span></button>
      </div>
    </div>

    <div class="foot">
      <span class="vin" id="vin">—</span>
      <span>
        <button id="settingsBtn">settings</button>
        <span class="sep">|</span>
        <button id="refresh">refresh</button>
      </span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const OIL_INTERVAL = 5000;
const REPO = 'YamesMacK/garage-uconnect';
const CMD_WORKFLOW = 'command.yml';
const RESET_OIL_WORKFLOW = 'reset_oil.yml';
const CMD_MAP = { lock: 'lock', unlock: 'unlock' };
const SPINNER_MS = 3000;

const fmtMi = (n) => n == null ? '—' : Math.round(n).toLocaleString('en-US');
const fmtV  = (n) => n == null ? '—' : n.toFixed(1);

function relTime(iso) {
  if (!iso) return 'never';
  const t = new Date(iso).getTime();
  const diff = Date.now() - t;
  const m = Math.round(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}M`;
  const h = Math.round(m / 60);
  if (h < 24) return `${h}H`;
  const d = Math.round(h / 24);
  return `${d}D`;
}

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ----- icons (used inside tiles) -----
const ICON_OIL = `
<svg class="tile-icon amber" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <path d="M5 14h14a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2z"/>
  <path d="M9 14V8h7l3 3"/>
  <path d="M22 17l3-2v5l-3-2z" fill="currentColor"/>
  <circle cx="12" cy="6" r="0.8" fill="currentColor"/>
</svg>`;
const ICON_BATT = `
<svg class="tile-icon green" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
  <rect x="4" y="9" width="18" height="12" rx="2"/>
  <line x1="22" y1="13" x2="22" y2="17"/>
  <line x1="9" y1="15" x2="13" y2="15"/>
  <line x1="11" y1="13" x2="11" y2="17"/>
  <line x1="16" y1="15" x2="18" y2="15"/>
</svg>`;

function render(data) {
  if (!data || !data.vehicles || !data.vehicles.length) {
    document.getElementById('grid').innerHTML =
      '<div class="empty" style="grid-column: span 2;">No vehicles in data.json yet.</div>';
    return;
  }

  const v = data.vehicles[0];
  document.getElementById('vin').textContent = v.vin || '—';

  const sync = document.getElementById('sync');
  const updated = data.last_updated || v.last_updated;
  sync.textContent = `Synced ${relTime(updated)} ago`;
  const ageMin = updated ? (Date.now() - new Date(updated).getTime()) / 60000 : 999;
  sync.classList.toggle('stale', ageMin > 90);

  const fuelPct = v.fuel_pct != null ? v.fuel_pct : 0;
  const fuelWarn = !!v.fuel_low;

  const oil = v.oil || {};
  const milesToNext = oil.miles_to_next != null ? oil.miles_to_next : OIL_INTERVAL;
  const oilOverdue = milesToNext <= 0;
  const oilSoon = milesToNext > 0 && milesToNext < 500;

  const tirePsi = v.tires_psi || {};
  const tireWarn = v.tires_warning || {};
  const tireCell = (cls, label, pos) => {
    const psi = tirePsi[pos];
    const w = tireWarn[pos];
    return `<div class="tire-cell ${cls}">
      <span class="tire-pos">${label}</span>
      <span class="tire-num${w ? ' warn' : ''}">${psi != null ? Math.round(psi) : '—'}</span>
    </div>`;
  };

  const loc = v.location || {};
  const hasLoc = loc.lat != null && loc.lng != null;
  const place = loc.place || (hasLoc ? 'GPS lock' : 'No fix');
  const coordStr = hasLoc
    ? `${loc.lat.toFixed(3)}, ${loc.lng.toFixed(3)}`
    : '—';
  const mapsUrl = hasLoc ? `https://www.google.com/maps?q=${loc.lat},${loc.lng}` : '#';
  const embedUrl = hasLoc ? `https://maps.google.com/maps?q=${loc.lat},${loc.lng}&z=14&output=embed` : '';

  const arcDash = (fuelPct / 100) * 131.95;

  // Battery state
  const battV = v.battery_v;
  const battLow = battV != null && battV < 12.4;

  document.getElementById('grid').innerHTML = `
    <!-- Odometer -->
    <div class="tile">
      <div class="tile-label">Odometer</div>
      <div class="tile-value">${fmtMi(v.odometer_mi)}</div>
      <div class="tile-sub">mi</div>
    </div>

    <!-- Range with half-arc fuel gauge -->
    <div class="tile">
      <div class="tile-label">Range</div>
      <div class="range-row">
        <div class="range-text">
          <div class="tile-value">${fmtMi(v.range_mi)}</div>
          <div class="tile-sub${fuelWarn ? ' warn' : ''}">mi${fuelWarn ? ' · low' : ''}</div>
        </div>
        <div class="fuel-arc">
          <svg viewBox="0 0 100 60">
            <defs>
              <linearGradient id="fuelArcGr" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#d68a3a"/>
                <stop offset="100%" stop-color="#f0a850"/>
              </linearGradient>
            </defs>
            <path d="M 8 50 A 42 42 0 0 1 92 50"
                  fill="none" class="fuel-arc-track" stroke-width="6"/>
            <path d="M 8 50 A 42 42 0 0 1 92 50"
                  fill="none" class="fuel-arc-fill" stroke-width="6"
                  stroke-dasharray="${arcDash} 131.95"/>
          </svg>
          <div class="fuel-arc-pct">${fuelPct}<span class="u">%</span></div>
        </div>
      </div>
      <div class="fuel-arc-label" style="text-align:right; margin-top:2px;">Fuel</div>
    </div>

    <!-- Oil 5K with reset -->
    <div class="tile oil-tile">
      ${ICON_OIL}
      <div class="tile-label">Oil Life · 5K</div>
      <div class="tile-value ${oilOverdue ? 'warn' : 'amber'}">
        ${oilOverdue ? 'DUE' : fmtMi(milesToNext)}<span class="u">${oilOverdue ? '' : 'mi'}</span>
      </div>
      <div class="tile-sub${oilOverdue || oilSoon ? ' warn' : ''}">
        ${oilOverdue ? `${fmtMi(-milesToNext)} mi overdue` : oilSoon ? 'change soon' : 'to next change'}
      </div>
      <button class="reset" id="resetOilBtn">Reset</button>
    </div>

    <!-- Battery -->
    <div class="tile">
      ${ICON_BATT}
      <div class="tile-label">Battery</div>
      <div class="tile-value">${fmtV(battV)}<span class="u">v</span></div>
      <div class="tile-sub${battLow ? ' warn' : ' healthy'}">${battV == null ? '—' : battLow ? 'Low' : 'Healthy'}</div>
    </div>

    <!-- Tire PSI with truck photo -->
    <div class="tile tile-wide">
      <div class="tile-label">Tire PSI</div>
      <div class="tires-corners">
        ${tireCell('tl', 'FL', 'front_left')}
        <img class="truck-photo" src="img/truck-top.png" alt="Top-down view of Ram 2500" loading="lazy"/>
        ${tireCell('tr', 'FR', 'front_right')}
        ${tireCell('bl', 'RL', 'rear_left')}
        ${tireCell('br', 'RR', 'rear_right')}
      </div>
    </div>

    <!-- Location -->
    <div class="tile tile-wide">
      <div class="tile-label">Location</div>
      <div class="loc-place">${place}</div>
      ${hasLoc ? `
        <div class="loc-map">
          <iframe loading="lazy" src="${embedUrl}"></iframe>
          <span class="loc-coords">${coordStr}</span>
          <a class="loc-link" target="_blank" rel="noopener" href="${mapsUrl}">Open ↗</a>
        </div>
      ` : '<div class="tile-sub">No GPS fix</div>'}
    </div>
  `;

  const resetBtn = document.getElementById('resetOilBtn');
  if (resetBtn) {
    resetBtn.addEventListener('click', () => resetOil(resetBtn));
    refreshResetEnabled();
  }
}

async function load() {
  try {
    const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data);
  } catch (err) {
    document.getElementById('grid').innerHTML =
      `<div class="empty" style="grid-column: span 2;">Couldn't load data.json<br><span style="font-size:11px">${err.message}</span></div>`;
    document.getElementById('sync').textContent = 'sync error';
    document.getElementById('sync').classList.add('stale');
  }
}

const getPat = () => localStorage.getItem('gh_pat') || '';
const setPat = (v) => localStorage.setItem('gh_pat', v);
const clearPat = () => localStorage.removeItem('gh_pat');

function refreshCmdEnabled() {
  const has = !!getPat();
  document.querySelectorAll('.btn[data-cmd]').forEach(b => {
    b.disabled = !has;
    b.title = has ? '' : 'Set a GitHub token in settings first';
  });
  refreshResetEnabled();
}
function refreshResetEnabled() {
  const has = !!getPat();
  const r = document.getElementById('resetOilBtn');
  if (r) {
    r.disabled = !has;
    r.title = has ? 'Reset oil-life baseline to current odometer' : 'Set a GitHub token in settings first';
  }
}

async function dispatch(workflow, inputs = {}) {
  const pat = getPat();
  if (!pat) throw new Error('NO_PAT');
  const res = await fetch(
    `https://api.github.com/repos/${REPO}/actions/workflows/${workflow}/dispatches`,
    {
      method: 'POST',
      headers: {
        'Accept': 'application/vnd.github+json',
        'Authorization': `Bearer ${pat}`,
        'X-GitHub-Api-Version': '2022-11-28',
      },
      body: JSON.stringify({ ref: 'main', inputs }),
    }
  );
  return res;
}

async function sendCommand(label, btn) {
  const cmd = CMD_MAP[label];
  if (!cmd) return;
  if (!getPat()) {
    toast('Set a GitHub token in settings first');
    return;
  }
  if (btn.classList.contains('loading')) return;
  btn.classList.add('loading');
  btn.disabled = true;

  const spinUntil = Date.now() + SPINNER_MS;
  let dispatchErr = null;
  try {
    const res = await dispatch(CMD_WORKFLOW, { command: cmd });
    if (res.status !== 204) {
      const txt = await res.text().catch(() => '');
      dispatchErr = { status: res.status, txt };
    }
  } catch (err) {
    dispatchErr = { msg: err.message };
  }
  const wait = Math.max(0, spinUntil - Date.now());
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.disabled = false;
    refreshCmdEnabled();
    if (dispatchErr) {
      if (dispatchErr.status === 401 || dispatchErr.status === 403) {
        toast('GitHub auth failed — check your token');
      } else if (dispatchErr.status === 404) {
        toast('Workflow not found');
      } else if (dispatchErr.msg) {
        toast(`Error: ${dispatchErr.msg}`);
      } else {
        toast(`HTTP ${dispatchErr.status}`);
      }
    }
  }, wait);
}

async function resetOil(btn) {
  if (!getPat()) {
    toast('Set a GitHub token in settings first');
    return;
  }
  if (!confirm('Reset oil baseline to current odometer? Use this after an oil change.')) return;
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = '…';
  try {
    const res = await dispatch(RESET_OIL_WORKFLOW, {});
    if (res.status === 204) {
      toast('Oil baseline reset — refreshing in ~30s');
      setTimeout(load, 30000);
    } else if (res.status === 401 || res.status === 403) {
      toast('GitHub auth failed');
    } else if (res.status === 404) {
      toast('reset_oil workflow not deployed');
    } else {
      const txt = await res.text();
      toast(`HTTP ${res.status}: ${txt.slice(0, 80)}`);
    }
  } catch (err) {
    toast(`Error: ${err.message}`);
  } finally {
    btn.textContent = original;
    refreshResetEnabled();
  }
}

document.querySelectorAll('.btn[data-cmd]').forEach(btn => {
  btn.addEventListener('click', () => sendCommand(btn.dataset.cmd, btn));
});
document.getElementById('refresh').addEventListener('click', () => {
  load();
  toast('refreshed');
});

const panel = document.getElementById('settings');
const patInput = document.getElementById('patInput');

document.getElementById('settingsBtn').addEventListener('click', () => {
  patInput.value = getPat();
  panel.classList.toggle('show');
});
document.getElementById('patClose').addEventListener('click', () => {
  panel.classList.remove('show');
});
document.getElementById('patSave').addEventListener('click', () => {
  const v = patInput.value.trim();
  if (!v) { toast('Token is empty'); return; }
  setPat(v);
  refreshCmdEnabled();
  panel.classList.remove('show');
  toast('Token saved');
});
document.getElementById('patClear').addEventListener('click', () => {
  clearPat();
  patInput.value = '';
  refreshCmdEnabled();
  toast('Token cleared');
});

refreshCmdEnabled();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

load();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') load();
});
</script>
</body>
</html>
