<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1620">
<title>Garage</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;600;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  min-height: 100vh;
  font-family: 'Lora', serif;
  color: #e8dcc4;
  background:
    radial-gradient(ellipse at 50% 30%, rgba(240, 168, 80, 0.04), transparent 70%),
    repeating-radial-gradient(circle at 26% 28%,
      transparent, transparent 14px,
      rgba(232, 220, 196, 0.10) 14px, rgba(232, 220, 196, 0.10) 15px),
    repeating-radial-gradient(circle at 74% 68%,
      transparent, transparent 11px,
      rgba(232, 220, 196, 0.08) 11px, rgba(232, 220, 196, 0.08) 12px),
    repeating-radial-gradient(circle at 50% 96%,
      transparent, transparent 18px,
      rgba(232, 220, 196, 0.06) 18px, rgba(232, 220, 196, 0.06) 19px),
    linear-gradient(170deg, #0e1620 0%, #0a1015 100%);
  background-attachment: fixed;
}
body {
  padding: max(env(safe-area-inset-top), 20px) 16px max(env(safe-area-inset-bottom), 20px);
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 480px;
  margin: 0 auto;
}

/* ---- Header ---- */
.header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 4px 4px 12px;
  border-bottom: 1.5px solid rgba(232, 220, 196, 0.18);
}
.title {
  font-family: 'Big Shoulders Display', sans-serif;
  font-weight: 800;
  font-size: 24px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #e8dcc4;
}
.title em { font-style: normal; color: #f0a850; }
.sync {
  font-style: italic;
  font-size: 12px;
  color: #8a7d65;
}
.sync.stale { color: #d47842; }

/* ---- Bento ---- */
.bento {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.tile {
  background: rgba(232, 220, 196, 0.035);
  border: 1px solid rgba(232, 220, 196, 0.14);
  border-radius: 4px;
  padding: 14px 14px 12px;
  min-height: 86px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.tile-wide { grid-column: span 2; }

.tile-label {
  font-family: 'Big Shoulders Display', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #8a7d65;
}
.tile-value {
  font-family: 'Big Shoulders Display', sans-serif;
  font-weight: 800;
  font-size: 32px;
  line-height: 1;
  color: #e8dcc4;
}
.tile-value.small { font-size: 22px; }
.unit {
  font-size: 13px;
  color: #8a7d65;
  font-weight: 600;
  margin-left: 3px;
  letter-spacing: 0.05em;
}
.tile-sub {
  font-style: italic;
  font-size: 12px;
  color: #8a7d65;
}
.tile-sub.warn { color: #d47842; font-style: normal; font-weight: 600; letter-spacing: 0.05em; }
.accent { color: #f0a850; }

.tires {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 14px;
  margin-top: 6px;
}
.tire {
  font-family: 'Big Shoulders Display', sans-serif;
  font-weight: 600;
  font-size: 15px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  color: #e8dcc4;
}
.tire.warn { color: #d47842; }
.tire-pos {
  font-family: 'Big Shoulders Display', sans-serif;
  font-size: 10px;
  color: #8a7d65;
  letter-spacing: 0.12em;
  font-weight: 600;
}

.bar {
  height: 3px;
  background: rgba(232, 220, 196, 0.10);
  margin-top: 8px;
  overflow: hidden;
  border-radius: 1px;
}
.bar > span {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, #c97a2b, #f0a850);
  transition: width 0.4s;
}
.bar.warn > span { background: #d44a2b; }

.reset-pill {
  position: absolute;
  top: 10px;
  right: 10px;
  font-family: 'Big Shoulders Display', sans-serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  font-weight: 600;
  text-transform: uppercase;
  border: 1px solid rgba(232, 220, 196, 0.25);
  color: #8a7d65;
  background: transparent;
  padding: 3px 8px;
  cursor: pointer;
  border-radius: 100px;
}
.reset-pill:active { background: rgba(232, 220, 196, 0.08); }

/* ---- Commands ---- */
.commands {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-top: 4px;
}
.cmd {
  background: rgba(232, 220, 196, 0.04);
  border: 1px solid rgba(232, 220, 196, 0.18);
  color: #e8dcc4;
  font-family: 'Big Shoulders Display', sans-serif;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 14px 0;
  cursor: pointer;
  border-radius: 3px;
}
.cmd:active { background: rgba(232, 220, 196, 0.10); }
.cmd-primary {
  background: #c97a2b;
  border-color: #d4884a;
  color: #1a0f08;
}
.cmd-primary:active { background: #b66920; }
.cmd[disabled] { opacity: 0.5; cursor: default; }

/* ---- Footer / settings ---- */
.foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 4px 0;
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 11px;
  color: #5a4f3e;
}
.foot button {
  background: transparent;
  border: none;
  color: #8a7d65;
  font-family: inherit;
  font-style: italic;
  font-size: 11px;
  text-decoration: underline;
  cursor: pointer;
  padding: 4px 0;
}

/* ---- Toast ---- */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #1a2230;
  border: 1px solid rgba(232, 220, 196, 0.25);
  color: #e8dcc4;
  padding: 12px 18px;
  border-radius: 4px;
  font-family: 'Lora', serif;
  font-size: 13px;
  font-style: italic;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  opacity: 0;
  transition: all 0.3s;
  z-index: 100;
  max-width: 320px;
  text-align: center;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ---- Empty / loading ---- */
.empty {
  text-align: center;
  padding: 40px 16px;
  color: #5a4f3e;
  font-style: italic;
}
</style>
</head>
<body>

  <div class="header">
    <div class="title" id="title">Garage <em>·</em> 2500</div>
    <div class="sync" id="sync">loading…</div>
  </div>

  <div class="bento" id="bento">
    <div class="empty" style="grid-column: span 2;">Awaiting first sync…</div>
  </div>

  <div class="commands">
    <button class="cmd" data-cmd="lock">Lock</button>
    <button class="cmd" data-cmd="unlock">Unlock</button>
    <button class="cmd cmd-primary" data-cmd="start">Start</button>
  </div>

  <div class="foot">
    <span id="vin">—</span>
    <button id="refresh">refresh</button>
  </div>

  <div class="toast" id="toast"></div>

<script>
const OIL_INTERVAL = 5000;

// ----- format helpers -----
const fmtMi = (n) => n == null ? '—' : Math.round(n).toLocaleString('en-US');
const fmtV  = (n) => n == null ? '—' : n.toFixed(1);

function relTime(iso) {
  if (!iso) return 'never';
  const t = new Date(iso).getTime();
  const diff = Date.now() - t;
  const m = Math.round(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m} min ago`;
  const h = Math.round(m / 60);
  if (h < 24) return `${h} hr ago`;
  const d = Math.round(h / 24);
  return `${d} day${d > 1 ? 's' : ''} ago`;
}

// ----- toast -----
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ----- render -----
function render(data) {
  if (!data || !data.vehicles || !data.vehicles.length) {
    document.getElementById('bento').innerHTML =
      '<div class="empty" style="grid-column: span 2;">No vehicles in data.json yet.</div>';
    return;
  }

  const v = data.vehicles[0];
  document.getElementById('title').innerHTML =
    `${v.nickname || 'Garage'} <em>·</em> ${v.year || ''}`;
  document.getElementById('vin').textContent = v.vin || '—';

  // Sync time + staleness
  const sync = document.getElementById('sync');
  const updated = data.last_updated || v.last_updated;
  sync.textContent = `synced ${relTime(updated)}`;
  const ageMin = updated ? (Date.now() - new Date(updated).getTime()) / 60000 : 999;
  sync.classList.toggle('stale', ageMin > 90);

  // Fuel bar pct + warn flag
  const fuelPct = v.fuel_pct != null ? v.fuel_pct : 0;
  const fuelWarn = !!v.fuel_low;

  // Oil 5k math
  const oil = v.oil || {};
  const milesToNext = oil.miles_to_next != null ? oil.miles_to_next : OIL_INTERVAL;
  const milesSince  = oil.miles_since  != null ? oil.miles_since  : 0;
  const oilPctUsed  = Math.min(100, (milesSince / OIL_INTERVAL) * 100);
  const oilOverdue  = milesToNext <= 0;
  const oilSoon     = milesToNext > 0 && milesToNext < 500;

  // Tires
  const t = v.tires_psi || {};
  const tw = v.tires_warning || {};
  const tireRow = (pos, label) => {
    const psi = t[pos];
    const warn = tw[pos];
    return `<div class="tire${warn ? ' warn' : ''}">
      <span class="tire-pos">${label}</span>
      <span>${psi != null ? Math.round(psi) : '—'}</span>
    </div>`;
  };

  // Location
  const loc = v.location || {};
  const hasLoc = loc.lat != null && loc.lng != null;
  const placeText = loc.place || (hasLoc ? 'GPS lock' : 'No fix');
  const coordText = hasLoc
    ? `N ${loc.lat.toFixed(3)}°  ·  W ${Math.abs(loc.lng).toFixed(3)}°`
    : '—';

  document.getElementById('bento').innerHTML = `
    <div class="tile tile-wide">
      <div class="tile-label">Odometer</div>
      <div class="tile-value">${fmtMi(v.odometer_mi)}<span class="unit">MI</span></div>
    </div>

    <div class="tile">
      <div class="tile-label">Range</div>
      <div class="tile-value">${fmtMi(v.range_mi)}<span class="unit">MI</span></div>
      <div class="tile-sub${fuelWarn ? ' warn' : ''}">Fuel — ${fuelPct}%${fuelWarn ? ' · low' : ''}</div>
      <div class="bar${fuelWarn ? ' warn' : ''}"><span style="width:${fuelPct}%"></span></div>
    </div>

    <div class="tile">
      <div class="tile-label">Oil · 5k</div>
      <div class="tile-value ${oilOverdue ? '' : 'accent'}" style="${oilOverdue ? 'color:#d44a2b' : ''}">
        ${oilOverdue ? 'DUE' : fmtMi(milesToNext)}<span class="unit">${oilOverdue ? '' : 'MI'}</span>
      </div>
      <div class="tile-sub${oilOverdue || oilSoon ? ' warn' : ''}">
        ${oilOverdue ? `${fmtMi(-milesToNext)} mi past due` : oilSoon ? 'change soon' : 'to next change'}
      </div>
      <button class="reset-pill" id="resetOil">Reset</button>
    </div>

    <div class="tile">
      <div class="tile-label">Battery</div>
      <div class="tile-value">${fmtV(v.battery_v)}<span class="unit">V</span></div>
      <div class="tile-sub">${v.battery_v == null ? '—' : v.battery_v < 12.4 ? 'low' : 'healthy'}</div>
    </div>

    <div class="tile">
      <div class="tile-label">Tire PSI</div>
      <div class="tires">
        ${tireRow('front_left',  'FL')}
        ${tireRow('front_right', 'FR')}
        ${tireRow('rear_left',   'RL')}
        ${tireRow('rear_right',  'RR')}
      </div>
    </div>

    <div class="tile tile-wide">
      <div class="tile-label">Position</div>
      <div class="tile-value small">${placeText.toUpperCase()}</div>
      <div class="tile-sub">${coordText}</div>
    </div>
  `;

  // wire up reset (Phase 2 will replace this)
  const reset = document.getElementById('resetOil');
  if (reset) {
    reset.addEventListener('click', () => {
      toast('Reset wiring ships in Phase 2 (with command auth)');
    });
  }
}

// ----- fetch -----
async function load() {
  try {
    const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data);
  } catch (err) {
    document.getElementById('bento').innerHTML =
      `<div class="empty" style="grid-column: span 2;">Couldn't load data.json<br><span style="font-size:11px">${err.message}</span></div>`;
    document.getElementById('sync').textContent = 'sync error';
    document.getElementById('sync').classList.add('stale');
  }
}

// ----- buttons (Phase 1: placeholder) -----
document.querySelectorAll('.cmd[data-cmd]').forEach(btn => {
  btn.addEventListener('click', () => {
    toast(`${btn.dataset.cmd} — Phase 2 wires this up`);
  });
});
document.getElementById('refresh').addEventListener('click', () => {
  load();
  toast('refreshed');
});

// ----- service worker -----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

load();
// auto-refresh on tab focus
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') load();
});
</script>
</body>
</html>
