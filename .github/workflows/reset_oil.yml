name: Reset oil baseline

# Triggered by the dashboard's "Reset" pill on the Oil tile (via the GitHub
# API workflow_dispatch). Re-anchors dashboard/oil_baseline.json to the
# current odometer reading from data.json so miles_to_next reads 5,000,
# then chains a poll.yml run to redeploy Pages with the fresh numbers.

# The tag makes each dispatch findable by the device that fired it — the
# dashboard polls the runs list and matches its tag in the run name (same
# pattern as command.yml).
run-name: "Reset oil baseline ${{ inputs.tag }}"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Client correlation tag (set automatically by the dashboard; leave blank for manual runs)"
        type: string
        required: false
        default: ""

permissions:
  contents: write
  actions: write  # to chain the poll/deploy run after the baseline commit

concurrency:
  group: oil-baseline
  cancel-in-progress: false

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Re-anchor baseline
        run: python scripts/reset_oil.py

      - name: Commit updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # data.json is staged too — reset_oil.py re-anchors its oil block
          # so the chained deploy shows the reset immediately.
          git add dashboard/oil_baseline.json dashboard/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Reset oil baseline to current odometer [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — re-applying onto fresh origin/main"
            # A poll may have committed fresh telemetry while we ran. Do NOT
            # rebase with -X theirs: that replays our commit and would clobber
            # the poll's newer fuel/door/service data and last_updated with our
            # stale checkout, just to change the oil block. Instead hard-reset
            # to the freshest main and re-run reset_oil.py, which re-derives the
            # oil block on top of the poll's current data.json (and merges the
            # baseline for our VIN without touching others) — telemetry stays
            # the poll's, only the oil fields change.
            git fetch origin main || { sleep 2; continue; }
            git reset --hard origin/main
            if ! python scripts/reset_oil.py; then
              echo "Re-anchor on fresh main failed — aborting rather than committing stale data" >&2
              exit 1
            fi
            git add dashboard/oil_baseline.json dashboard/data.json
            if git diff --staged --quiet; then
              echo "Baseline already current on origin/main — nothing left to push"
              exit 0
            fi
            git commit -m "Reset oil baseline to current odometer [skip ci]"
          done
          echo "Push failed after 5 attempts" >&2
          exit 1

      - name: Chain a Pages deploy
        # The push above is authenticated with GITHUB_TOKEN, which never
        # fires poll.yml's on:push (GitHub's no-recursive-runs rule — the
        # [skip ci] in the commit message is belt-and-suspenders). Dispatch
        # poll.yml explicitly (workflow_dispatch is exempt) so the dashboard
        # shows the reset in ~3 min instead of waiting for the next cron
        # slot. Non-fatal: this run's conclusion should reflect whether the
        # baseline was reset — a failed chained dispatch only means the tile
        # waits for cron.
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run poll.yml --ref main || echo "::warning::poll dispatch failed — next cron poll will deploy the new baseline"
