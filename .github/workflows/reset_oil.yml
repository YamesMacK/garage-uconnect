name: Reset oil baseline

# Triggered by the dashboard's "Reset" pill on the Oil tile (via the GitHub
# API workflow_dispatch). Re-anchors dashboard/oil_baseline.json to the
# current odometer reading from data.json so miles_to_next reads 5,000.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: oil-baseline
  cancel-in-progress: false

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Re-anchor baseline
        run: python scripts/reset_oil.py

      - name: Commit updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/oil_baseline.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Reset oil baseline to current odometer [skip ci]"
            for attempt in 1 2 3 4 5; do
              if git push; then
                exit 0
              fi
              echo "Push rejected (attempt $attempt) — rebasing onto origin/main and retrying"
              # -X theirs: on conflict keep THIS run's regenerated baseline
              # (in a rebase the replayed commit is "theirs"). A plain rebase
              # conflicts when both sides rewrite the file and strands the
              # loop. The || branch keeps a failed pull from aborting the
              # step (set -e) and cleans up a half-done rebase.
              git pull --rebase -X theirs origin main || { git rebase --abort 2>/dev/null || true; sleep 2; }
            done
            echo "Push failed after 5 attempts" >&2
            exit 1
          fi
